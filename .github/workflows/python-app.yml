name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    
    - name: Testando o Codigo
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
       
    - name: Executar o pytest no projeto
      run: |
        PYTHONPATH=. pytest tests/ -v --tb=short
  
  Imagem:
    name: Construindo as imagens para docker
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Docker Login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{secrets.DOCKER_USER}}
          password: ${{secrets.DOCKER_TOKEN}}
      
      - name: Configurar docker na VM
        uses: docker/build-push-action@v7.1.0
        with:
          push: true
          tags: |
            gabbflor/aula_devops:latest
            gabbflor/aula_devops:${{github.sha}}
  DEPLOY:
    name: Implementando na EC2
    runs-on: ubuntu-latest
    needs: Imagem

    steps:
      - name: Deploy na EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USER}}
          key: ${{secrets.EC2_KEY}}
          script: |
            echo "Iniciando deploy"

            sudo docker pull gabbflor/aula_devops:tagname

            sudo docker stop aula_devops 2>/dev/null true
            sudo docker rm aula_devops 2>/dev/null true

            sudo docker run --name aula_devops -d -p 80:8080 gabbflor/aula_devops:tagname

            sleep 5

            curl -f http://localhost/health || exit 1

            echo "Deploy deu bão"
# só pra dar rebuildd
